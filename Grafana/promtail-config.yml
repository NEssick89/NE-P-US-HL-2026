# Modified YAML config for Loki on US-01 

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
- url: https://logs-prod-042.grafana.net/loki/api/v1/push
  basic_auth:
    username: "1649855"
    password: "${LOKI_API_KEY}"

scrape_configs:
- job_name: system
  static_configs:
  - targets:
      - localhost
    labels:
      job: varlogs
      host: ubuntu-server-01
      __path__: /var/log/*
      